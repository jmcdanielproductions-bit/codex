<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Codex — Document Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --hd:'Bebas Neue','Arial Narrow',Arial,sans-serif;
  --bd:'Space Grotesk','Inter','Segoe UI',Arial,sans-serif;
  --ink:#0f0e17;--ink-s:#2e2c45;--ink-m:#5a5870;--ink-f:#8a88a0;
  --pu:#5b4fcf;--pu-l:#eeecfc;--pu-m:#c8c2f5;--pu-d:#2e2780;
  --te:#1d9e75;--te-l:#e1f5ee;--am:#ba7517;--am-l:#faeeda;
  --rd:#a32d2d;--rd-l:#fcebeb;
  --rule:#e0dcf5;--surf:#f7f5ff;
  --ui:#1a1828;--uip:#221f35;--uib:#2e2b45;--uih:#2a2742;--uia:#332f52;
}
html,body{height:100%;overflow:hidden;font-family:var(--bd)}
body{display:flex;flex-direction:column;background:var(--ui)}

.topbar{height:48px;background:var(--uip);border-bottom:1px solid var(--uib);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;z-index:10}
.tb-brand{font-family:var(--hd);font-size:18px;color:#f0eeff;letter-spacing:2px;margin-right:4px}
.tb-sep{width:1px;height:20px;background:var(--uib)}
.tb-btn{font-family:var(--bd);font-size:10.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:5px 12px;border-radius:5px;cursor:pointer;border:1px solid var(--uib);background:transparent;color:#a09ec8;transition:all .15s;white-space:nowrap}
.tb-btn:hover{background:var(--uih);color:#f0eeff}
.tb-btn.primary{background:var(--pu);border-color:var(--pu);color:#fff}
.tb-btn.primary:hover{background:#4a3fbe}
.tb-btn.danger{border-color:#a32d2d33;color:var(--rd)}
.tb-btn.danger:hover{background:#2a1010;color:#f5a0a0}
.tb-sp{flex:1}
.tb-status{font-size:10px;color:var(--ink-f);font-style:italic;white-space:nowrap}
.tb-pgcount{font-size:10px;color:var(--pu-m);font-weight:600;white-space:nowrap}

.workspace{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--uip);border-right:1px solid var(--uib);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:10px 12px 6px;border-bottom:1px solid var(--uib)}
.sidebar-head-lbl{font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-f);margin-bottom:8px}
.sidebar-tabs{display:flex;flex-direction:column;padding:6px;gap:2px;overflow-y:auto;flex:1}
.sec-row{display:flex;align-items:center;gap:4px;border-radius:6px;transition:background .12s}
.sec-row:hover{background:var(--uih)}
.sec-row.active{background:var(--uia)}
.eye-btn{width:24px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:transparent;border-radius:4px;flex-shrink:0;font-size:13px;color:var(--pu-m);opacity:1;transition:opacity .15s}
.eye-btn.off{opacity:.25;color:var(--ink-f)}
.eye-btn:hover{background:rgba(255,255,255,.05)}
.tab-btn{display:flex;align-items:center;gap:7px;padding:6px 8px 6px 2px;cursor:pointer;border:none;background:transparent;text-align:left;flex:1;min-width:0}
.tab-num{font-family:var(--hd);font-size:13px;color:var(--pu-m);min-width:18px;line-height:1;flex-shrink:0}
.tab-lbl{font-size:11px;font-weight:600;color:#c8c6e8;letter-spacing:.3px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-row.active .tab-lbl{color:#f0eeff}
.sec-row.active .tab-num{color:var(--pu)}
.tab-badge{font-size:8px;font-weight:700;background:var(--uia);color:var(--pu-m);padding:2px 5px;border-radius:8px;min-width:18px;text-align:center;flex-shrink:0}
.sec-row.active .tab-badge{background:var(--pu);color:#fff}
.sec-row.hidden-section .tab-lbl{color:var(--ink-f)}
.sec-row.hidden-section .tab-num{color:var(--uib)}
.sidebar-footer{border-top:1px solid var(--uib);padding:10px 12px}
.sf-lbl{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink-f);margin-bottom:6px}
.sf-hint{font-size:9.5px;color:var(--ink-f);line-height:1.5}

.form-panel{width:300px;flex-shrink:0;border-right:1px solid var(--uib);overflow-y:auto;background:var(--ui)}
.form-panel-inner{padding:16px 14px 24px}
.fs{margin-bottom:20px}
.fs-title{font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--pu);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--uib);display:flex;align-items:center;gap:6px}
.field{margin-bottom:10px}
.field label{display:block;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#7a78a0;margin-bottom:4px}
.field input,.field select{width:100%;background:#0d0c18;border:1px solid var(--uib);border-radius:6px;padding:7px 10px;font-family:var(--bd);font-size:12px;color:#e0def8;outline:none;transition:border-color .15s}
.field textarea{width:100%;background:#0d0c18;border:1px solid var(--uib);border-radius:6px;padding:7px 10px;font-family:var(--bd);font-size:12px;color:#e0def8;outline:none;resize:vertical;min-height:60px;line-height:1.55;transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--pu);background:#110f1e}
.field select option{background:#1a1828}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field-row .field{margin-bottom:0}

.rr{background:#0d0c18;border:1px solid var(--uib);border-radius:7px;padding:10px;margin-bottom:8px;position:relative;transition:opacity .15s,border-color .15s}
.rr:hover{border-color:#3a3760}
.rr.dragging{opacity:.35}
.rr.drag-over{border-color:var(--pu);box-shadow:0 0 0 2px rgba(91,79,207,.2)}
.rr-top{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.rr-num{font-family:var(--hd);font-size:14px;color:var(--pu-m);flex:1;letter-spacing:.5px}
.rr-actions{display:flex;gap:4px}
.rr .field{margin-bottom:6px}
.rr .field:last-child{margin-bottom:0}
.rr .field-row .field{margin-bottom:0}

.ic-btn{font-size:8.5px;font-weight:700;padding:3px 8px;border-radius:4px;cursor:pointer;border:none;font-family:var(--bd);transition:all .12s}
.ic-dup{background:var(--pu-l);color:var(--pu-d)}.ic-dup:hover{background:var(--pu-m)}
.ic-rem{background:var(--rd-l);color:var(--rd)}.ic-rem:hover{background:#f5c0c0}
.ic-drag{background:var(--uia);color:#6a68a0;cursor:grab;font-size:11px;padding:3px 6px}
.ic-drag:active{cursor:grabbing}

.add-btn{display:flex;align-items:center;gap:6px;font-size:9.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:7px 12px;border-radius:6px;cursor:pointer;border:1px dashed var(--uib);font-family:var(--bd);background:transparent;color:#7a78a0;margin-top:4px;width:100%;justify-content:center;transition:all .15s}
.add-btn:hover{border-color:var(--pu);color:var(--pu-m);background:rgba(91,79,207,.05)}

.swatch-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.swatch-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.swatch-item input[type=color]{width:36px;height:28px;padding:2px;border-radius:4px;border:1px solid var(--uib);cursor:pointer;background:transparent}
.swatch-item input[type=text]{width:56px;background:#0d0c18;border:1px solid var(--uib);border-radius:4px;padding:2px 4px;font-family:var(--bd);font-size:8.5px;color:#e0def8;text-align:center;outline:none}
.swatch-item input[type=text]:focus{border-color:var(--pu)}
.preset-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.preset-btn{font-size:8.5px;font-weight:600;padding:4px 9px;border-radius:4px;cursor:pointer;border:1px solid var(--uib);background:#0d0c18;color:#a09ec8;transition:all .12s}
.preset-btn:hover{border-color:var(--pu);color:#f0eeff}

.img-upload{border:1px dashed var(--uib);border-radius:6px;padding:10px;text-align:center;cursor:pointer;background:#0d0c18;transition:border-color .15s;margin-top:2px;position:relative}
.img-upload:hover{border-color:var(--pu)}
.img-upload input{display:none}
.img-upload-lbl{font-size:9px;color:var(--ink-f);line-height:1.5}
.img-thumb{width:100%;height:52px;object-fit:cover;border-radius:4px;margin-top:5px;display:block}
.img-clear{position:absolute;top:5px;right:5px;width:18px;height:18px;border-radius:50%;background:rgba(163,45,45,.85);color:#fff;border:none;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}

.empty-state{padding:20px 16px;text-align:center;border:1px dashed var(--uib);border-radius:7px;margin-bottom:10px}
.empty-state-icon{font-size:22px;margin-bottom:6px}
.empty-state-text{font-size:11px;color:var(--ink-f);line-height:1.5}
.section-disabled{padding:32px 20px;text-align:center}
.sd-icon{font-size:28px;margin-bottom:10px;opacity:.4}
.sd-title{font-family:var(--hd);font-size:22px;color:#3a3860;margin-bottom:6px;letter-spacing:1px}
.sd-text{font-size:11px;color:var(--ink-f);line-height:1.6;margin-bottom:14px}
.sd-btn{font-size:9.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:7px 14px;border-radius:6px;cursor:pointer;border:1px solid var(--uib);font-family:var(--bd);background:transparent;color:var(--pu-m);transition:all .15s}
.sd-btn:hover{border-color:var(--pu);background:rgba(91,79,207,.08)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{background:var(--uip);border:1px solid var(--uib);border-radius:10px;padding:20px;width:420px;max-width:95vw}
.modal-title{font-family:var(--hd);font-size:20px;color:#f0eeff;letter-spacing:1px;margin-bottom:14px}
.modal-row{display:flex;gap:8px;margin-bottom:8px}
.modal-row input{flex:1;background:#0d0c18;border:1px solid var(--uib);border-radius:6px;padding:8px 10px;font-family:var(--bd);font-size:12px;color:#e0def8;outline:none}
.modal-row input:focus{border-color:var(--pu)}
.modal-info{font-size:10px;color:var(--ink-f);margin-bottom:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.modal-btn{font-family:var(--bd);font-size:10.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:6px 14px;border-radius:5px;cursor:pointer;border:1px solid var(--uib);background:transparent;color:#a09ec8;transition:all .15s}
.modal-btn:hover{background:var(--uih);color:#f0eeff}
.modal-btn.primary{background:var(--pu);border-color:var(--pu);color:#fff}
.modal-btn.primary:hover{background:#4a3fbe}

/* CSV modal */
.csv-check-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.csv-check-item{display:flex;align-items:center;gap:8px;font-size:11px;color:#c8c6e8;cursor:pointer}
.csv-check-item input{width:14px;height:14px;accent-color:var(--pu)}

.preview-panel{flex:1;overflow-y:auto;background:#aaa8c0;padding:20px;display:flex;flex-direction:column;align-items:center;gap:16px}
.pg{width:210mm;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.25);position:relative;overflow:hidden;flex-shrink:0;min-height:297mm}

@media print{
  .topbar,.sidebar,.form-panel,.modal-overlay{display:none!important}
  .preview-panel{background:white;padding:0;gap:0;overflow:visible}
  .pg{width:210mm;min-height:297mm;box-shadow:none;margin:0;page-break-after:always}
  .pg:last-child{page-break-after:avoid}
  @page{size:A4;margin:0}
  body,html{overflow:visible;height:auto}
  .workspace{overflow:visible;display:block}
  .sb-add-tile,.sb-fi-add-hint{display:none!important}
}

/* DOC */
.pg-hdr{display:flex;justify-content:space-between;align-items:center;padding:15px 46px 0}
.pg-hdr-brand{font-family:var(--hd);font-size:14px;letter-spacing:1.5px}
.pg-hdr-meta{font-size:9px;color:var(--ink-m)}
.pg-hdr-rule{height:1px;background:var(--rule);margin:10px 46px 0}
.pg-body{padding:20px 46px 60px}
.pg-ftr{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 46px;border-top:1px solid var(--rule);background:var(--surf)}
.pg-ftr-brand{font-family:var(--hd);font-size:13px;color:var(--ink)}
.pg-ftr-meta{font-size:8.5px;color:var(--ink-m)}
.pg-ftr-num{font-family:var(--hd);font-size:13px}
.s-lbl{font-size:8px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--pu);margin-bottom:3px}
.s-ttl{font-family:var(--hd);font-size:27px;letter-spacing:.5px;line-height:1;color:var(--ink);margin-bottom:8px}
.rule-bar{width:26px;height:3px;background:var(--pu);border-radius:2px;margin-bottom:12px}
.h-rule{border:none;border-top:1px solid var(--rule);margin:14px 0}

/* COVER */
.cov-pg{display:flex;flex-direction:column}
.cov-geo{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;pointer-events:none}
.cov-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.cov-scrim{position:absolute;inset:0;z-index:1}
.g-r{position:absolute;border-radius:50%}
.cov-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:52px 60px 0;position:relative;z-index:2}
.cov-ey{font-size:9px;font-weight:600;letter-spacing:4px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.cov-ey::before{content:'';display:block;width:20px;height:1px}
.cov-ttl{font-family:var(--hd);font-size:92px;line-height:.88;margin-bottom:5px;letter-spacing:2px}
.cov-sub{font-family:var(--hd);font-size:34px;line-height:1;margin-bottom:18px}
.cov-desc{font-size:12px;font-weight:300;max-width:380px;line-height:1.7;margin-bottom:28px}
.cov-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:40px}
.mp{display:inline-flex;flex-direction:column;border-radius:5px;padding:6px 11px}
.mp-l{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.mp-v{font-size:11px;font-weight:500}
.cov-strip{padding:17px 60px;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
.cov-strip-b{font-family:var(--hd);font-size:16px;letter-spacing:3px}
.cov-strip-p{font-family:var(--hd);font-size:13px}

.t-tomori{background:#0f0e17}
.t-tomori .cov-geo .g-r1{width:340px;height:340px;right:-75px;top:-75px;border:48px solid rgba(91,79,207,.1)}
.t-tomori .cov-geo .g-r2{width:180px;height:180px;right:60px;top:60px;border:1px solid rgba(91,79,207,.13)}
.t-tomori .cov-geo .g-r3{width:120px;height:120px;left:-25px;bottom:200px;border:20px solid rgba(91,79,207,.07)}
.t-tomori .cov-geo .g-lh{position:absolute;height:1px;left:52px;right:52px;top:25%;background:rgba(91,79,207,.1)}
.t-tomori .cov-geo .g-lv{position:absolute;width:1px;top:0;bottom:0;left:52px;background:rgba(91,79,207,.07)}
.t-tomori .cov-ey{color:#6b67c4}.t-tomori .cov-ey::before{background:#6b67c4}
.t-tomori .cov-ttl{color:#f0eeff}.t-tomori .cov-sub{color:#7a78c8}.t-tomori .cov-desc{color:#c0bde8}
.t-tomori .mp{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
.t-tomori .mp-l{color:#6b67c4}.t-tomori .mp-v{color:#e0ddf5}
.t-tomori .cov-strip{border-top:1px solid rgba(255,255,255,.07)}
.t-tomori .cov-strip-b{color:rgba(255,255,255,.16)}.t-tomori .cov-strip-p{color:#4a4888}
.t-tomori .cov-scrim{background:linear-gradient(135deg,rgba(15,14,23,.82) 0%,rgba(15,14,23,.45) 100%)}

.t-mono{background:#ffffff}
.t-mono .cov-geo .g-r1{display:none}
.t-mono .cov-geo .g-r2{display:none}
.t-mono .cov-geo .g-r3{display:none}
.t-mono .cov-geo .g-lh{display:none}
.t-mono .cov-geo .g-lv{display:none}
.t-mono .cov-ey{color:#7ab0d4}.t-mono .cov-ey::before{background:#7ab0d4}
.t-mono .cov-ttl{color:#0a0a0f}.t-mono .cov-sub{color:#3a3a3a}.t-mono .cov-desc{color:#555}
.t-mono .mp{background:rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.08)}
.t-mono .mp-l{color:#7ab0d4}.t-mono .mp-v{color:#1a1a1a}
.t-mono .cov-strip{border-top:1px solid #e8e8e8}
.t-mono .cov-strip-b{color:#ddd}.t-mono .cov-strip-p{color:#aaa}
.t-mono .cov-scrim{background:linear-gradient(135deg,rgba(255,255,255,.78) 0%,rgba(255,255,255,.3) 100%)}

/* inner mono overrides */
.doc-mono .pg-hdr-brand{color:#7ab0d4!important}.doc-mono .pg-hdr-rule{background:rgba(0,0,0,.08)!important}
.doc-mono .s-lbl{color:#5a9abf}.doc-mono .rule-bar{background:#7ab0d4!important}
.doc-mono .pg-ftr{background:#f8f8f8;border-top-color:#e0e0e0}.doc-mono .pg-ftr-num{color:#7ab0d4!important}
.doc-mono .ov-hero{background:#0a0a0f}.doc-mono .rb{background:#e6f2f9;color:#2a7aaa}
.doc-mono .tp{background:#0a0a0f;color:#a0c8e0}.doc-mono .sc-hd{border-left-color:#7ab0d4}
.doc-mono .ms-dot{border-color:#7ab0d4}.doc-mono .ms-dot.done{background:#7ab0d4}
.doc-mono .ms-dot.active{box-shadow:0 0 0 3px #d0e8f5}
.doc-mono .tl-line-fill{background:linear-gradient(90deg,#7ab0d4,#b0d0e8)!important}
.doc-mono .cat-badge{background:#e6f2f9;color:#2a7aaa}.doc-mono .note-hdr{color:#5a9abf}
.doc-mono .note-num{color:#7ab0d4}.doc-mono .vb-c{background:#e6f2f9;color:#2a7aaa}
.doc-mono .pf-sec-title{border-bottom-color:#d0e8f5}.doc-mono .pf-bullet{background:#7ab0d4}
.doc-mono .pf-feat-tag{background:#e6f2f9;color:#2a7aaa}
.doc-mono .rule-bar,.doc-mono .pb2{background:#7ab0d4!important}
.doc-mono .pb1{background:#1a1a2e}.doc-mono .pb3{background:#b0d0e8;color:#1a3a5a}
.doc-mono .pb4{background:#f5f5f5;color:#666}
.doc-mono .toc-num{color:#7ab0d4!important}.doc-mono .toc-dots{border-bottom-color:#c0d8e8!important}

/* TABLE OF CONTENTS */
.toc-entry{display:flex;align-items:baseline;gap:6px;padding:7px 0;border-bottom:1px solid var(--rule)}
.toc-entry:last-child{border-bottom:none}
.toc-num{font-family:var(--hd);font-size:18px;color:var(--pu);min-width:30px;line-height:1}
.toc-icon{font-size:13px;min-width:20px;text-align:center}
.toc-label{font-size:12px;font-weight:600;color:var(--ink-s);flex:1;letter-spacing:.2px}
.toc-dots{flex:1;border-bottom:1px dotted var(--rule);margin:0 8px;align-self:center;min-width:20px}
.toc-pg{font-family:var(--hd);font-size:14px;color:var(--ink-m)}

/* OVERVIEW */
.ov-hero{background:var(--ink);border-radius:7px;padding:18px 22px;margin-bottom:12px;position:relative;overflow:hidden}
.ov-hero::after{content:'';position:absolute;right:-25px;top:-25px;width:100px;height:100px;border-radius:50%;border:18px solid rgba(91,79,207,.12)}
.ov-hl{font-size:8px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#6b67c4;margin-bottom:4px}
.ov-ht{font-family:var(--hd);font-size:32px;color:#f0eeff;line-height:.95;margin-bottom:8px}
.ov-hd{font-size:11.5px;font-weight:300;color:#b0aede;line-height:1.6;max-width:460px}
.spec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:11px}
.sc{background:var(--surf);border:1px solid var(--rule);border-radius:5px;padding:9px 11px}
.sc-l{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink-m);margin-bottom:3px}
.sc-v{font-family:var(--hd);font-size:16px;color:var(--ink);line-height:1;margin-bottom:1px}
.sc-s{font-size:9px;color:var(--ink-f)}
.tone-strip{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px}
.tp{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:100px;background:var(--ink);color:#c8c2f5}
.tm-tbl{width:100%;border-collapse:collapse}
.tm-tbl th{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink-m);text-align:left;padding:5px 8px;border-bottom:2px solid var(--rule)}
.tm-tbl td{font-size:11px;color:var(--ink-s);padding:6px 8px;border-bottom:1px solid var(--rule)}
.tm-tbl tr:last-child td{border-bottom:none}
.rb{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:var(--pu-l);color:var(--pu-d)}

/* PRODUCT */
.pf-hero{background:var(--ink);border-radius:7px;padding:18px 22px;margin-bottom:16px;position:relative;overflow:hidden}
.pf-hero::after{content:'';position:absolute;right:-25px;top:-25px;width:100px;height:100px;border-radius:50%;border:18px solid rgba(91,79,207,.12)}
.pf-hl{font-size:8px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#6b67c4;margin-bottom:4px}
.pf-ht{font-family:var(--hd);font-size:28px;color:#f0eeff;line-height:1;margin-bottom:6px}
.pf-hd{font-size:11.5px;font-weight:300;color:#b0aede;line-height:1.6}
.pf-section{margin-bottom:16px}
.pf-sec-title{font-family:var(--hd);font-size:16px;color:var(--ink);letter-spacing:.5px;margin-bottom:6px;padding-bottom:4px;border-bottom:2px solid var(--pu-l)}
.pf-feat-list{list-style:none;padding:0}
.pf-feat-item{display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--rule)}
.pf-feat-item:last-child{border-bottom:none}
.pf-bullet{width:6px;height:6px;border-radius:50%;background:var(--pu);flex-shrink:0;margin-top:5px}
.pf-feat-text{font-size:11.5px;color:var(--ink-s);line-height:1.6;flex:1}
.pf-feat-tag{font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:var(--pu-l);color:var(--pu-d);white-space:nowrap;flex-shrink:0;margin-top:2px}
.pf-spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pf-spec-card{background:var(--surf);border:1px solid var(--rule);border-radius:5px;padding:10px 12px}
.pf-spec-label{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink-m);margin-bottom:4px}
.pf-spec-value{font-size:12px;color:var(--ink-s);line-height:1.5}

/* MOODBOARD */
.mood-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,82px);gap:6px;margin-bottom:10px}
.mf{border-radius:5px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:6px 8px}
.mf span{font-size:7.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.55);position:relative;z-index:2}
.mf.large{grid-row:span 2}
.mf img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
.pal-row{display:flex;height:36px;border-radius:5px;overflow:hidden;margin-bottom:10px}
.pal-sw{flex:1;display:flex;align-items:center;justify-content:center}
.pal-sw span{font-size:7px;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase}
.brief-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.bb{background:var(--surf);border:1px solid var(--rule);border-radius:5px;padding:10px 12px}
.bb-t{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--pu);margin-bottom:6px}
.bt-row{display:flex;gap:4px;flex-wrap:wrap}
.bt{font-size:9px;color:var(--ink-s);padding:3px 7px;background:#fff;border:1px solid var(--rule);border-radius:3px}
.bt.no{text-decoration:line-through;color:var(--ink-f)}
.ref-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ref-c{border:1px solid var(--rule);border-radius:4px;overflow:hidden}
.ref-i{height:46px;position:relative;overflow:hidden}
.ref-i img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.ref-cap{padding:4px 6px;border-top:1px solid var(--rule)}
.ref-ct{font-size:9px;font-weight:600;color:var(--ink);margin-bottom:1px}
.ref-cs{font-size:8px;color:var(--ink-m)}

/* STORYBOARD */
.sb-mr{display:flex;gap:10px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
.sb-mi{font-size:9px;color:var(--ink-m)}.sb-mi strong{font-weight:600;color:var(--ink)}
.sb-cont{font-size:7.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:3px;background:var(--pu-l);color:var(--pu-d);margin-left:auto}
.sb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sbf{border:1px solid var(--rule);border-radius:4px;overflow:hidden;background:#fff}
.sb-fi{position:relative;width:100%;background:var(--surf);border-bottom:1px solid var(--rule)}
.sb-fi::before{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--rule) 1px,transparent 1px),linear-gradient(90deg,var(--rule) 1px,transparent 1px);background-size:14px 14px;opacity:.35}
.sb-fi::after{content:'';position:absolute;inset:6px;border:1px dashed var(--pu-m);border-radius:2px}
.sb-fi img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:3}
.sb-fn{position:absolute;top:5px;left:5px;font-family:var(--hd);font-size:14px;color:var(--pu-m);z-index:4;line-height:1}
.sb-badge{position:absolute;top:5px;right:5px;font-size:6.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 4px;border-radius:2px;z-index:4}
.bw{background:#e8f4ff;color:#0c3d6b}.bcu{background:var(--pu-l);color:var(--pu-d)}.bms{background:var(--te-l);color:#084e38}.bots{background:var(--am-l);color:#5a3200}.bins{background:var(--rd-l);color:#5a1010}.bae{background:#1a1a2e;color:#8b87d4}
.sb-bd{padding:5px 6px}
.sb-sl{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-m);margin-bottom:2px}
.sb-desc{font-size:8.5px;color:var(--ink-s);line-height:1.42;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sb-ft{display:flex;justify-content:space-between;gap:4px}
.sb-dur{font-size:7px;color:var(--ink-f);white-space:nowrap}
.sb-aud{font-size:7px;font-style:italic;color:var(--ink-m);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-fi-add-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--ink-f);z-index:2;flex-direction:column;gap:3px;opacity:.6}
.sb-add-tile{border:1px dashed var(--uib);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;min-height:80px;transition:border-color .15s,background .15s;background:var(--surf)}
.sb-add-tile:hover{border-color:var(--pu);background:var(--pu-l)}

/* SHOT LIST */
.cs-hero{background:var(--ink);border-radius:7px;padding:14px 18px;margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.cs-hero-item .cs-hl{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#6b67c4;margin-bottom:2px}
.cs-hero-item .cs-hv{font-size:12px;color:#e0ddf5;font-weight:500}
.cs-table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:10px}
.cs-table th{font-size:7.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink-m);text-align:left;padding:5px 8px;border-bottom:2px solid var(--rule);background:var(--surf)}
.cs-table td{padding:6px 8px;border-bottom:1px solid var(--rule);color:var(--ink-s);vertical-align:top}
.cs-table tr:last-child td{border-bottom:none}
.cs-table tr:hover td{background:var(--surf)}
.shot-num{font-family:var(--hd);font-size:15px;color:var(--pu-m)}
.shot-type-badge{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 5px;border-radius:3px;white-space:nowrap}

/* FILM SCRIPT */
.sc-mb{display:flex;gap:14px;margin-bottom:12px;padding-bottom:9px;border-bottom:2px solid var(--ink);flex-wrap:wrap}
.sc-mi strong{font-weight:600;color:var(--ink);display:block;font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-bottom:1px}
.sc-mi{font-size:10.5px;color:var(--ink-m)}
.sc-hd{font-family:var(--hd);font-size:12.5px;letter-spacing:1.5px;color:var(--ink);background:var(--surf);border-left:3px solid var(--pu);padding:5px 10px;margin-bottom:7px;border-radius:0 4px 4px 0}
.sc-act{font-size:10.5px;color:var(--ink-s);line-height:1.68;margin:0 0 9px;padding:0 3px}
.sc-dlg{margin:0 auto 10px;max-width:72%;padding:0 8px}
.sc-ch{font-family:var(--hd);font-size:11px;letter-spacing:1px;color:var(--ink);text-align:center;margin-bottom:1px}
.sc-dr{font-size:9px;color:var(--ink-m);font-style:italic;text-align:center;margin-bottom:3px}
.sc-tx{font-size:11px;color:var(--ink-s);line-height:1.65;text-align:center}
.sc-tr{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--ink-m);text-align:right;margin:7px 0;padding-right:5px}

/* COMMERCIAL COPY */
.cc-hdr{font-family:var(--hd);font-size:14px;letter-spacing:1.5px;color:var(--ink);background:var(--surf);border-left:3px solid var(--pu);padding:5px 10px;margin-bottom:7px;border-radius:0 4px 4px 0;text-transform:uppercase}
.cc-body{font-size:11px;color:var(--ink-s);line-height:1.75;margin-bottom:12px;white-space:pre-wrap;word-break:break-word}
.cc-meta-bar{display:flex;gap:14px;margin-bottom:12px;padding-bottom:9px;border-bottom:2px solid var(--ink);flex-wrap:wrap}
.cc-mi{font-size:10.5px;color:var(--ink-m)}
.cc-mi strong{font-weight:600;color:var(--ink);display:block;font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-bottom:1px}

/* TIMELINE */
.ph-bar{display:flex;height:23px;border-radius:5px;overflow:hidden;margin-bottom:18px}
.phb{display:flex;align-items:center;padding:0 9px;font-size:8.5px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;white-space:nowrap;overflow:hidden}
.pb1{background:#2e2780;color:#c8c2f5;flex:1}.pb2{background:var(--pu);color:#fff;flex:1.2}.pb3{background:var(--pu-m);color:#2e2780;flex:1}.pb4{background:var(--surf);color:var(--ink-m);border:1px solid var(--rule);flex:1}
.tl-wrap{margin-bottom:20px}
.ms-above{display:grid;margin-bottom:8px}
.ma-it{text-align:center;padding:0 2px}
.ma-ph{font-family:var(--hd);font-size:11px;color:var(--ink);letter-spacing:.5px;line-height:1;margin-bottom:2px}
.ma-tg{font-size:7.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-m)}
.tl-line-wrap{position:relative;height:12px;display:flex;align-items:center;margin:0 4%}
.tl-line-bg{position:absolute;left:0;right:0;height:2px;background:var(--rule);border-radius:1px}
.tl-line-fill{position:absolute;left:0;height:2px;background:linear-gradient(90deg,var(--pu),var(--pu-m));border-radius:1px}
.ms-dots-row{display:grid;margin-top:4px}
.ms-dot-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.ms-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--pu);background:#fff;flex-shrink:0}
.ms-dot.done{background:var(--pu)}.ms-dot.active{box-shadow:0 0 0 3px var(--pu-l)}.ms-dot.future{border-color:var(--rule)}
.ms-date{font-size:7.5px;color:var(--ink-f);text-align:center}
.dg{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:12px}
.dc{border:1px solid var(--rule);border-radius:4px;padding:8px 10px;display:flex;gap:8px;align-items:flex-start}
.ds{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:2px}
.ds-d{background:var(--te)}.ds-a{background:var(--pu)}.ds-p{background:var(--rule);border:1px solid var(--ink-f)}
.dt{font-size:11px;font-weight:600;color:var(--ink);margin-bottom:1px}
.dm{font-size:9px;color:var(--ink-m)}

/* GEAR */
.gear-grid{display:flex;flex-direction:column;border:1px solid var(--rule);border-radius:6px;overflow:hidden;margin-bottom:12px}
.gear-row{display:grid;grid-template-columns:28px 1fr 44px 66px 80px}
.gear-row.hdr{background:var(--surf)}
.gr-cell{padding:6px 8px;font-size:10.5px;color:var(--ink-s);border-right:1px solid var(--rule);border-bottom:1px solid var(--rule)}
.gr-cell:last-child{border-right:none}
.gear-row:last-child .gr-cell{border-bottom:none}
.gear-row.hdr .gr-cell{font-size:7.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink-m)}
.gr-num{font-family:var(--hd);font-size:13px;color:var(--pu-m);text-align:center;display:flex;align-items:center;justify-content:center}
.gr-status{display:inline-block;font-size:7.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 5px;border-radius:3px}
.gs-owned{background:var(--te-l);color:var(--te)}.gs-rented{background:var(--am-l);color:var(--am)}.gs-needed{background:var(--rd-l);color:var(--rd)}
.cat-badge{font-size:7.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 5px;border-radius:3px;background:var(--pu-l);color:var(--pu-d)}

/* PROPS */
.prop-grid{display:flex;flex-direction:column;border:1px solid var(--rule);border-radius:6px;overflow:hidden;margin-bottom:12px}
.prop-row{display:grid;grid-template-columns:28px 1fr 1fr 36px 80px}
.prop-row.hdr{background:var(--surf)}
.pr-cell{padding:6px 8px;font-size:10.5px;color:var(--ink-s);border-right:1px solid var(--rule);border-bottom:1px solid var(--rule)}
.pr-cell:last-child{border-right:none}
.prop-row:last-child .pr-cell{border-bottom:none}
.prop-row.hdr .pr-cell{font-size:7.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink-m)}
.pr-num{font-family:var(--hd);font-size:13px;color:var(--pu-m);text-align:center;display:flex;align-items:center;justify-content:center}
.prop-note{font-size:8.5px;color:var(--ink-f);font-style:italic;display:block;margin-top:1px}
.ps-owned{background:var(--te-l);color:var(--te)}.ps-rented{background:var(--am-l);color:var(--am)}.ps-buy{background:var(--pu-l);color:var(--pu-d)}.ps-make{background:#fff7ed;color:#7a4c00}

/* NOTES */
.note-block{background:var(--surf);border:1px solid var(--rule);border-radius:5px;overflow:hidden;margin-bottom:12px}
.note-hdr{padding:8px 13px;border-bottom:1px solid var(--rule);font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--pu)}
.note-entry{display:flex;gap:9px;padding:7px 13px;border-bottom:1px solid var(--rule)}
.note-entry:last-child{border-bottom:none}
.note-num{font-family:var(--hd);font-size:15px;color:var(--pu-m);min-width:20px;line-height:1.3;flex-shrink:0}
.note-text{font-size:11px;color:var(--ink-s);line-height:1.62;white-space:pre-wrap;word-break:break-word}
.ver-tbl{width:100%;border-collapse:collapse}
.ver-tbl th{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink-m);text-align:left;padding:5px 8px;border-bottom:2px solid var(--rule)}
.ver-tbl td{font-size:10.5px;color:var(--ink-s);padding:6px 8px;border-bottom:1px solid var(--rule)}
.ver-tbl tr:last-child td{border-bottom:none}
.vb{font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px}
.vb-c{background:var(--pu-l);color:var(--pu)}.vb-o{background:var(--surf);color:var(--ink-m)}

.autosave-toast{position:fixed;bottom:18px;right:18px;background:var(--uip);border:1px solid var(--pu);border-radius:6px;padding:8px 14px;font-size:10.5px;color:var(--pu-m);z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.autosave-toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <span class="tb-brand">CODEX</span>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="saveProject()">💾 Save</button>
  <button class="tb-btn" onclick="document.getElementById('lf').click()">📂 Load</button>
  <input type="file" id="lf" accept=".json" style="display:none" onchange="loadProject(event)">
  <button class="tb-btn danger" onclick="confirmReset()">New</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="openFindReplace()">🔍 Find &amp; Replace</button>
  <button class="tb-btn" onclick="openCSVModal()">⬇ CSV</button>
  <div class="tb-sep"></div>
  <button class="tb-btn primary" onclick="window.print()">Print / PDF ⌘P</button>
  <div class="tb-sp"></div>
  <span class="tb-pgcount" id="pgCount"></span>
  <div class="tb-sep"></div>
  <span class="tb-status" id="statusMsg">Autosave on</span>
</div>

<div class="workspace">
  <div class="sidebar">
    <div class="sidebar-head"><div class="sidebar-head-lbl">Sections</div></div>
    <div class="sidebar-tabs" id="sidebarTabs"></div>
    <div class="sidebar-footer">
      <div class="sf-lbl">Tip</div>
      <div class="sf-hint">Eye icon shows/hides sections from the printed doc.</div>
    </div>
  </div>
  <div class="form-panel" id="formPanel"><div class="form-panel-inner"></div></div>
  <div class="preview-panel" id="previewPanel"></div>
</div>

<!-- FIND & REPLACE MODAL -->
<div class="modal-overlay hidden" id="frModal">
  <div class="modal">
    <div class="modal-title">Find &amp; Replace</div>
    <div class="modal-row">
      <input id="frFind" placeholder="Find…" oninput="frCount()">
    </div>
    <div class="modal-row">
      <input id="frReplace" placeholder="Replace with…">
    </div>
    <div class="modal-info" id="frInfo">Type a search term above.</div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeFR()">Cancel</button>
      <button class="modal-btn primary" onclick="doReplace()">Replace All</button>
    </div>
  </div>
</div>

<!-- CSV EXPORT MODAL -->
<div class="modal-overlay hidden" id="csvModal">
  <div class="modal">
    <div class="modal-title">Export CSV</div>
    <div class="csv-check-list">
      <label class="csv-check-item"><input type="checkbox" id="csv-shots" checked> Shot List (${S&&S.callsheet?S.callsheet.shots.length:0} shots)</label>
      <label class="csv-check-item"><input type="checkbox" id="csv-gear" checked> Gear / Equipment</label>
      <label class="csv-check-item"><input type="checkbox" id="csv-props" checked> Props</label>
    </div>
    <div class="modal-info">Each selected list exports as a separate CSV file.</div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeCSV()">Cancel</button>
      <button class="modal-btn primary" onclick="doExportCSV()">Export</button>
    </div>
  </div>
</div>

<div class="autosave-toast" id="asToast">Autosaved</div>

<script>
// ─── SECTIONS ───
const SECTIONS=[
  {id:'cover',    label:'Cover',            icon:'🎬', badge:null},
  {id:'toc',      label:'Table of Contents',icon:'📑', badge:null},
  {id:'overview', label:'Overview',         icon:'📋', badge:null},
  {id:'product',  label:'Product Features', icon:'✦',  badge:null},
  {id:'mood',     label:'Moodboard',        icon:'🎨', badge:null},
  {id:'sb',       label:'Storyboard',       icon:'🎞',  badge:'frames'},
  {id:'callsheet',label:'Shot List',        icon:'📸', badge:'shots'},
  {id:'filmscript',label:'Film Script',     icon:'🎬', badge:'filmscenes'},
  {id:'comcopy',  label:'Commercial Copy',  icon:'📝', badge:null},
  {id:'timeline', label:'Timeline',         icon:'📅', badge:null},
  {id:'gear',     label:'Gear',             icon:'🎥', badge:'gearItems'},
  {id:'props',    label:'Props',            icon:'🎭', badge:'propItems'},
  {id:'notes',    label:'Notes',            icon:'📓', badge:null},
];

const PRESETS={
  'Dark Cinematic':['#0f0e17','#2d1b69','#5b4fcf','#c8c2f5','#eeecfc','#1d9e75','#f0eeff'],
  'Warm Film':['#1a0e08','#5c2d0a','#c47a2e','#e8c07a','#f5edd8','#8b3a1a','#fff8ee'],
  'Cool Editorial':['#08121a','#0a2a40','#1a6090','#5ab0d8','#d0ecf8','#2d8a6e','#f0f8ff'],

// ─── DRAG ───
function makeDraggable(){
  setTimeout(()=>{
    document.querySelectorAll('[data-drag-arr]').forEach(el=>{
      el.addEventListener('dragstart',e=>{dragSrc=el;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
      el.addEventListener('dragend',()=>{el.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));});
      el.addEventListener('dragover',e=>{e.preventDefault();if(el!==dragSrc)el.classList.add('drag-over');});
      el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
      el.addEventListener('drop',e=>{
        e.preventDefault();el.classList.remove('drag-over');
        if(dragSrc&&dragSrc!==el){
          const arr=getArr(el.dataset.dragArr);
          const[moved]=arr.splice(parseInt(dragSrc.dataset.dragIdx),1);
          arr.splice(parseInt(el.dataset.dragIdx),0,moved);
          renderForm();renderPreview();
        }
      });
    });
  },50);
}

// ─── FIND & REPLACE ───
function openFindReplace(){document.getElementById('frModal').classList.remove('hidden');document.getElementById('frFind').focus();}
function closeFR(){document.getElementById('frModal').classList.add('hidden');}
function frCount(){
  const q=document.getElementById('frFind').value;
  if(!q){document.getElementById('frInfo').textContent='Type a search term above.';return;}
  const n=countOccurrences(S,q);
  document.getElementById('frInfo').textContent=`${n} occurrence${n!==1?'s':''} found across all fields.`;
}
function countOccurrences(obj,q){
  let n=0;
  function walk(v){
    if(typeof v==='string'){let i=0;while((i=v.indexOf(q,i))!==-1){n++;i+=q.length;}}
    else if(Array.isArray(v))v.forEach(walk);
    else if(v&&typeof v==='object')Object.values(v).forEach(walk);
  }
  walk(obj);return n;
}
function replaceInObj(obj,q,r){
  if(typeof obj==='string')return obj.split(q).join(r);
  if(Array.isArray(obj))return obj.map(v=>replaceInObj(v,q,r));
  if(obj&&typeof obj==='object'){const out={};for(const k in obj)out[k]=replaceInObj(obj[k],q,r);return out;}
  return obj;
}
function doReplace(){
  const q=document.getElementById('frFind').value;
  const r=document.getElementById('frReplace').value;
  if(!q)return;
  const n=countOccurrences(S,q);
  if(n===0){showToast('No matches found');return;}
  const newS=replaceInObj(S,q,r);
  Object.assign(S,newS);
  closeFR();renderForm();renderPreview();
  showToast(`Replaced ${n} occurrence${n!==1?'s':''}`);
}

function downloadCSV(filename,content){
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(content);
  a.download=filename;a.click();
}

  if(document.getElementById('csv-gear').checked&&S.gear.items.length){
    const rows=[['#','Name','Qty','Category','Status','Notes'],...S.gear.items.map((g,i)=>[i+1,g.name,g.qty,g.category,g.status,g.notes])];
    downloadCSV(proj+'-gear.csv',toCSV(rows));

}

// ─── SIDEBAR ───
function renderSidebar(){
  const container=document.getElementById('sidebarTabs');
  let num=1;
  // Build page count map for TOC
  buildPageMap();
  container.innerHTML=SECTIONS.map(sec=>{
    const visible=S.sectionVisible[sec.id];
    const active=currentTab===sec.id;
    const badge=sec.badge?getBadge(sec.badge):null;
    const displayNum=visible?String(num++).padStart(2,'0'):'—';
    return`<div class="sec-row ${active?'active':''} ${!visible?'hidden-section':''}">
      <button class="eye-btn ${!visible?'off':''}" onclick="toggleSection('${sec.id}')">${visible?'👁':'◌'}</button>
      <button class="tab-btn" onclick="showTab('${sec.id}')">
        <span class="tab-num">${displayNum}</span>
        <span class="tab-lbl">${sec.icon} ${sec.label}</span>
        ${badge!==null?`<span class="tab-badge">${badge}</span>`:''}
      </button>
    </div>`;
  }).join('');
  const pgCount=getPageMap().total;
  document.getElementById('pgCount').textContent=pgCount+' page'+(pgCount!==1?'s':'');
  document.title='Codex — '+(S.cover.title.replace(/\\n/g,' ').replace(/\n/g,' ').trim()||'New Project');
}

// ─── PAGE MAP (for TOC) ───
let _pageMap=null;
function buildPageMap(){_pageMap=null;getPageMap();}
function getPageMap(){
  if(_pageMap)return _pageMap;
  const map={};let pg=1;
  SECTIONS.forEach(sec=>{
    if(!S.sectionVisible[sec.id])return;
    map[sec.id]=pg;
    if(sec.id==='sb')pg+=sbPages().length;
    else if(sec.id==='filmscript')pg+=filmScriptPages().length;
    else pg++;
  });
  _pageMap=map;_pageMap.total=pg-1;
  return _pageMap;
}

// ─── FILM SCRIPT PAGINATION ───
// Estimate lines per scene to split across pages (~46 lines per page body)
const LINES_PER_PAGE=44;
function estimateSceneLines(sc){
  let n=2; // heading
  if(sc.action)n+=Math.ceil(sc.action.length/80)+1;
  sc.dialogues.forEach(d=>{n+=3;if(d.text)n+=Math.ceil(d.text.length/60);});
  if(sc.transition)n+=1;
  return n+1;
}
function filmScriptPages(){
  const scenes=S.filmscript.scenes;
  if(!scenes.length)return[[]];
  const pages=[];let page=[];let used=0;
  // header takes ~4 lines on first page
  used=4;
  scenes.forEach(sc=>{
    const lines=estimateSceneLines(sc);
    if(used+lines>LINES_PER_PAGE&&page.length>0){pages.push(page);page=[];used=0;}
    page.push(sc);used+=lines;
  });
  if(page.length||!pages.length)pages.push(page);
  return pages;
}

// ─── PREVIEW ───
function renderPreview(){
  _pageMap=null; // reset page map
  const sw=S.mood.swatches;
  const moodBgs=['linear-gradient(135deg,#1a1a2e,#2d1b69)','linear-gradient(160deg,#0f0e17,#3a2d80 60%,#1d9e75)','linear-gradient(120deg,#2d1b69,#5b4fcf)','linear-gradient(140deg,#0a0a1a,#1a3a5c)','linear-gradient(150deg,#1d0a2e,#5b1f8a 50%,#c84b6e)'];
  const rawTitle=S.cover.title||'';
  const titleLines=rawTitle.replace(/\\n/g,'\n').split('\n');
  const msCount=Math.max(1,S.timeline.milestones.length);
  const colDef=`repeat(${msCount},1fr)`;
  const donePct=Math.round(S.timeline.milestones.filter(m=>m.state==='done').length/msCount*100);
  const sbPgs=sbPages();
  const fsPgs=filmScriptPages();
  const accent=sw[2]||'#5b4fcf';
  const th=S.cover.theme||'tomori';
  const isMono=th==='mono';
  const innerAccent=isMono?'#7ab0d4':accent;
  const docCls=isMono?'doc-mono':'';

// ─── FORM RENDER ───
function renderForm(){
  const visible=S.sectionVisible[currentTab];
  const fp=document.getElementById('formPanel');
  fp.innerHTML=`<div class="form-panel-inner">${visible?(forms[currentTab]?forms[currentTab]():''):sectionDisabled(currentTab)}</div>`;
  makeDraggable();
}

function showTab(id){
  currentTab=id;renderSidebar();renderForm();
  setTimeout(()=>{
    const pages=document.querySelectorAll('.preview-panel .pg');
    const visibleSections=SECTIONS.filter(s=>S.sectionVisible[s.id]);
    let idx=visibleSections.findIndex(s=>s.id===id);
    if(idx<0)idx=0;
    if(pages[idx])pages[idx].scrollIntoView({behavior:'smooth',block:'start'});
  },60);
}

// ─── SAVE / LOAD / RESET ───
function saveProject(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(S.overview.title||'tomori').replace(/[^a-z0-9]/gi,'-').toLowerCase()+'.json';
  a.click();showToast('Saved ✓');
}
function loadProject(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{
    try{const loaded=JSON.parse(ev.target.result);Object.keys(loaded).forEach(k=>S[k]=loaded[k]);renderSidebar();renderForm();renderPreview();showToast('Loaded ✓');}
    catch{alert('Invalid project file.');}
  };r.readAsText(f);
}
function confirmReset(){
  if(confirm('Start a new document? All unsaved changes will be lost.')){
    S=JSON.parse(JSON.stringify(DEFAULT));renderSidebar();renderForm();renderPreview();showToast('New document');
  }
}

// ─── INIT ───
loadAutosave();renderSidebar();renderForm();renderPreview();
</script>
</body>
</html>
